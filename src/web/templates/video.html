<!DOCTYPE html>
<html>

<style>

body{
    margin:0;
    background:black;
}

/* container full screen */
.container{
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* video wrapper */
.video-wrapper{
    position:relative;
    width:100%;
    height:100%;
}

/* fullscreen video */
.video-wrapper img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:relative;
    z-index:2;
}


.video-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    border-radius: 0px;

    opacity: 0;
    transition: opacity 0.4s ease;

    box-shadow:
        inset 0 0 40px 10px rgba(255, 0, 0, 0.7),
        inset 0 0 80px 20px rgba(255, 165, 0, 0.5),
        inset 0 0 120px 30px rgba(255, 255, 0, 0.3);
}

.video-wrapper.glow::after {
    opacity: 1;
    animation: lensGlow 2s linear infinite;
}

@keyframes lensGlow {
    0% {
        box-shadow:
            inset 0 0 40px 10px rgba(255, 0, 0, 0.8),
            inset 0 0 80px 20px rgba(255, 165, 0, 0.5),
            inset 0 0 120px 30px rgba(255, 255, 0, 0.3);
    }
    25% {
        box-shadow:
            inset 0 0 40px 10px rgba(0, 255, 0, 0.8),
            inset 0 0 80px 20px rgba(0, 200, 255, 0.5),
            inset 0 0 120px 30px rgba(0, 120, 255, 0.3);
    }
    50% {
        box-shadow:
            inset 0 0 40px 10px rgba(0, 0, 255, 0.8),
            inset 0 0 80px 20px rgba(138, 43, 226, 0.5),
            inset 0 0 120px 30px rgba(255, 0, 255, 0.3);
    }
    75% {
        box-shadow:
            inset 0 0 40px 10px rgba(255, 0, 180, 0.8),
            inset 0 0 80px 20px rgba(255, 80, 0, 0.5),
            inset 0 0 120px 30px rgba(255, 200, 0, 0.3);
    }
    100% {
        box-shadow:
            inset 0 0 40px 10px rgba(255, 0, 0, 0.8),
            inset 0 0 80px 20px rgba(255, 165, 0, 0.5),
            inset 0 0 120px 30px rgba(255, 255, 0, 0.3);
    }
}


/* Overlay div */
.extra{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%) translateX(100%);

    width:400px;
    height:1100px;

    background:rgba(0,0,0,0.7);
    color:white;

    display:flex;
    flex-direction:column;

    justify-content:flex-start;
    align-items:flex-start;

    padding:20px;

    opacity:0;
    pointer-events:none;

    border-radius:10px;

    transition: all 0.4s ease;

    z-index: 10;
}

.extra.show{
    transform:translateY(-50%) translateX(0);
    opacity:1;
    pointer-events:auto;
}

</style>

<body>

<div class="container">

    <div class="video-wrapper" id="videoWrapper">

        <img src="/video_feed">

        <!-- Overlay div -->
        <div id="extra" class="extra">
            Extra Division
        </div>

    </div>

</div>



<script>

let lastState = 0

async function checkBackend(){
    try{
        let checkRes = await fetch("/check")
        let checkData = await checkRes.json()

        let glowRes = await fetch("/glow")
        let glowData = await glowRes.json()

        console.log("check:", checkData.value)
        console.log("glow:", glowData.value)

        let extra = document.getElementById("extra")
        let wrapper = document.getElementById("videoWrapper")

        // =========================
        // PANEL
        // =========================

        if(checkData.value === 1 && lastState === 0){
            let res = await fetch("/result?ts=" + Date.now())
            let html = await res.text()

            extra.innerHTML = html
            extra.classList.add("show")
        }

        if(checkData.value === 0){
            extra.classList.remove("show")
        }

        lastState = checkData.value

        // =========================
        // GLOW
        // =========================

        if(glowData.value === 1){
            wrapper.classList.add("glow")
        } else {
            wrapper.classList.remove("glow")
        }

    } catch(err){
        console.log("ERROR:", err)
    }
}

setInterval(checkBackend, 1000)

</script>

</body>
</html>
